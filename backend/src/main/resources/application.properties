spring.application.name=ateion-backend

# Use Environment Variables for everything database-related
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# This allows Render to tell Spring Boot which port to use
server.port=${PORT:8080}

# Security and Logging
spring.jpa.open-in-view=false
logging.level.root=INFO
server.error.include-message=never

# Dynamic Frontend URL (Defaults to localhost if no environment variable is set)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}