<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ateion — Reimagining Education with Capability-Based Learning</title>
    <meta
      name="description"
      content="Ateion is a capability-based education ecosystem that replaces memory-based assessment with real-world measurable skills. Partner with 200+ institutions across 193+ countries."
    />
    <meta
      name="keywords"
      content="education, capability-first, AI literacy, innovation, assessment, Olympiad, GCO, global education"
    />
    <meta name="author" content="Ateion Pvt. Ltd." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ateion.com" />
    <meta name="theme-color" content="#f7f3eb" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ateion.com" />
    <meta property="og:title" content="Ateion — Reimagining Education" />
    <meta
      property="og:description"
      content="A capability-based education ecosystem replacing memory-based assessment with real-world measurable skills."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Ateion" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://ateion.com" />
    <meta name="twitter:title" content="Ateion — Reimagining Education" />
    <meta
      name="twitter:description"
      content="A capability-based education ecosystem replacing memory-based assessment with real-world measurable skills."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/src/assets/logo.png" />
    <link rel="apple-touch-icon" href="/src/assets/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />

    <!-- Non-blocking Google Fonts: Source Sans 3 only -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300..900&display=swap"
      media="print"
      onload="this.media='all'"
      aria-label="Google Fonts"
    />

    <!-- Preload critical above-fold assets -->
    <link rel="preload" as="image" href="/src/assets/logo.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/src/assets/hero/door-peachnight.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/src/assets/hero/learner-purple.webp" fetchpriority="high" />

    <!-- Anti-FOUC: Set theme before paint to prevent flash of wrong theme -->
    <script>
      (function () {
        var t = localStorage.getItem("ateion-theme");
        if (!t)
          t = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.setAttribute("data-theme", t);
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute("content", t === "dark" ? "#0f0f11" : "#f7f3eb");
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <div
        style="
          padding: 2rem;
          text-align: center;
          font-family: system-ui, sans-serif;
        "
      >
        <h1>Ateion — Reimagining Education</h1>
        <p>
          This application requires JavaScript to function. Please enable
          JavaScript and refresh the page.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
